<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard - PojokanPay</title>
  <link rel="stylesheet" href="style.css">
  <script>
    function toggleMenu() {
      document.getElementById('sidebar').classList.toggle('active');
    }
  </script>
</head>
<body>
  <header class="navbar">
    <div class="brand">PojokanPay</div>
    <button class="toggle-btn" onclick="toggleMenu()" aria-label="Toggle menu">☰</button>
    <nav class="nav-desktop">
      <a href="#home">Home</a>
      <a href="#transaksi">Transaksi</a>
      <a href="#pelanggan">Pelanggan</a>
      <a href="#pengaturan">Pengaturan</a>
      <a href="#chat">Chat</a>
      <a href="#logout">Logout</a>
    </nav>
  </header>
  <div class="main-wrapper">
    <aside id="sidebar" class="sidebar">
      <a href="#home">Home</a>
      <a href="#transaksi">Transaksi</a>
      <a href="#pelanggan">Pelanggan</a>
      <a href="#pengaturan">Pengaturan</a>
      <a href="#chat">Chat</a>
      <a href="#logout">Logout</a>
    </aside>
    <main class="content">
      <h2 id="home">Selamat datang, User!</h2>
      <p>Ini adalah dashboard Anda.</p>
    </main>
  </div>
</body>
</html>
