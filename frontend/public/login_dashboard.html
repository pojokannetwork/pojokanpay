<!-- File: login_dashboard.html -->
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - PojokanPay</title>
  <style>
    /* Reset sederhana */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { height: 100%; font-family: Arial, sans-serif; background: #f4f6f9; }
    
    /* Container tengah layar */
    .login-container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100%;
    }
    
    /* Kartu login */
    .login-card {
      background: #ffffff;
      padding: 2rem;
      border-radius: 0.5rem;
      box-shadow: 0 0 12px rgba(0,0,0,0.1);
      width: 320px;
    }
    .login-card h2 {
      margin-bottom: 1.5rem;
      text-align: center;
      color: #333;
    }
    
    /* Form input */
    .login-card label {
      display: block;
      margin-bottom: 0.5rem;
      color: #555;
      font-size: 0.9rem;
    }
    .login-card input[type="text"],
    .login-card input[type="password"] {
      width: 100%;
      padding: 0.5rem;
      margin-bottom: 1rem;
      border: 1px solid #ccc;
      border-radius: 0.25rem;
      font-size: 1rem;
    }
    
    /* Tombol submit */
    .login-card button {
      width: 100%;
      padding: 0.75rem;
      background: #007bff;
      border: none;
      border-radius: 0.25rem;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
    }
    .login-card button:hover {
      background: #0056b3;
    }
    
    /* Link lupa password */
    .login-card .forgot {
      display: block;
      margin-top: 0.75rem;
      text-align: center;
      font-size: 0.85rem;
      color: #007bff;
      text-decoration: none;
    }
    .login-card .forgot:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <!-- Letakkan file ini di folder frontend, misalnya: /opt/pojokpay/frontend/login_dashboard.html -->
  <div class="login-container">
    <div class="login-card">
      <h2>Masuk PojokanPay</h2>
      <form action="/api/auth/login" method="POST">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Masukkan username" required />

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Masukkan password" required />

        <button type="submit">Login</button>
      </form>
      <a href="#" class="forgot">Lupa Password?</a>
    </div>
  </div>
</body>
</html>
